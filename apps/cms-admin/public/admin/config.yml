backend:
  name: github
  repo: RuvikGroup/content
  branch: main
  base_url: https://cms-auth.ruvikgroup.com

media_folder: apps/asiaflare-blog/public/images
public_folder: /images

collections:
  - name: asiaflare-blog
    label: AsiaFlare Blog Posts
    media_folder: apps/asiaflare-blog/public/images
    public_folder: /images
    folder: apps/asiaflare-blog/src/content/blog
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: text }
      - { label: Publish Date, name: pubDate, widget: datetime }
      - { label: Author, name: author, widget: string, default: "AsiaFlare Team" }
      - { label: Tags, name: tags, widget: list, default: [] }
      - { label: Hero Image, name: heroImage, widget: image, required: false }
      - { label: Flag Emoji, name: flag, widget: string, required: false, hint: "Country flag emoji shown on the hero (e.g. 🇯🇵)" }
      - { label: Location, name: location, widget: string, required: false, hint: "City or country name shown on the hero (e.g. Tokyo)" }
      - { label: Draft, name: draft, widget: boolean, default: false }
      - { label: Body, name: body, widget: markdown }

  - name: latinflare-blog
    label: LatinFlare Blog Posts
    media_folder: apps/latinflare-blog/public/images
    public_folder: /images
    folder: apps/latinflare-blog/src/content/blog
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: text }
      - { label: Publish Date, name: pubDate, widget: datetime }
      - { label: Author, name: author, widget: string, default: "LatinFlare Team" }
      - { label: Tags, name: tags, widget: list, default: [] }
      - { label: Hero Image, name: heroImage, widget: image, required: false }
      - { label: Flag Emoji, name: flag, widget: string, required: false, hint: "Country flag emoji shown on the hero (e.g. 🇧🇷)" }
      - { label: Location, name: location, widget: string, required: false, hint: "City or country name shown on the hero (e.g. Rio de Janeiro)" }
      - { label: Draft, name: draft, widget: boolean, default: false }
      - { label: Body, name: body, widget: markdown }

  - name: asiaflare-docs-getting-started
    label: "AsiaFlare Docs: Getting Started"
    folder: apps/asiaflare-docs/src/content/docs/getting-started
    create: true
    slug: "{{slug}}"
    extension: mdx
    format: frontmatter
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: text, required: false }
      - label: Sidebar
        name: sidebar
        widget: object
        required: false
        fields:
          - { label: Order, name: order, widget: number, required: false }
      - { label: Body, name: body, widget: markdown }

  - name: asiaflare-docs-matching-discovery
