name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all sites
        run: pnpm run build

      - name: Upload asiaflare-docs dist
        uses: actions/upload-artifact@v4
        with:
          name: asiaflare-docs-dist
          path: apps/asiaflare-docs/dist

      - name: Upload asiaflare-blog dist
        uses: actions/upload-artifact@v4
        with:
          name: asiaflare-blog-dist
          path: apps/asiaflare-blog/dist

      - name: Upload latinflare-docs dist
        uses: actions/upload-artifact@v4
        with:
          name: latinflare-docs-dist
          path: apps/latinflare-docs/dist

      - name: Upload latinflare-blog dist
        uses: actions/upload-artifact@v4
        with:
          name: latinflare-blog-dist
          path: apps/latinflare-blog/dist

      - name: Upload cms-admin dist
        uses: actions/upload-artifact@v4
        with:
          name: cms-admin-dist
          path: apps/cms-admin/dist

  deploy-asiaflare-docs:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    name: Deploy asiaflare-docs
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: asiaflare-docs-dist
          path: dist

      - name: Deploy to Cloudflare Pages
        run: npx wrangler@latest pages deploy dist --project-name=ruvikgroup-asiaflare-docs --branch=${{ github.ref_name }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-asiaflare-blog:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    name: Deploy asiaflare-blog
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: asiaflare-blog-dist
          path: dist

      - name: Deploy to Cloudflare Pages
        run: npx wrangler@latest pages deploy dist --project-name=ruvikgroup-asiaflare-blog --branch=${{ github.ref_name }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-latinflare-docs:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    name: Deploy latinflare-docs
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: latinflare-docs-dist
          path: dist

      - name: Deploy to Cloudflare Pages
        run: npx wrangler@latest pages deploy dist --project-name=ruvikgroup-latinflare-docs --branch=${{ github.ref_name }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-latinflare-blog:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    name: Deploy latinflare-blog
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: latinflare-blog-dist
          path: dist

      - name: Deploy to Cloudflare Pages
        run: npx wrangler@latest pages deploy dist --project-name=ruvikgroup-latinflare-blog --branch=${{ github.ref_name }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-cms-admin:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    name: Deploy cms-admin
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: cms-admin-dist
          path: dist

      - name: Deploy to Cloudflare Pages
        run: npx wrangler@latest pages deploy dist --project-name=ruvikgroup-cms-admin --branch=${{ github.ref_name }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-domain-router:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    name: Deploy domain-router
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Worker
        run: npx wrangler@latest deploy --config apps/domain-router/wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
